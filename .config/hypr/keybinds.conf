#Keybinds

$scrPath = $HOME/.config/hypr/Scripts
$mainMod = SUPER

# 1. Applications
$TERMINAL = ghostty
$EDITOR = zed
$EXPLORER = thunar
$BROWSER = ~/.config/hypr/Scripts/browser-launcher.sh

bind = $mainMod, RETURN, exec, $TERMINAL
bind = $mainMod, E, exec, $EXPLORER
bind = $mainMod, C, exec, $EDITOR
bind = $mainMod, B, exec, $BROWSER
bind = CTRL SHIFT, SPACE, exec, 1password --quick-access

# 2. Noctalia
bind = $mainMod, D, exec, qs -c noctalia-shell ipc call launcher toggle
bind = $mainMod, L, exec, qs -c noctalia-shell ipc call lockScreen lock
bind = $mainMod, T, exec, qs -c noctalia-shell ipc call settings toggle
bind = $mainMod, O, exec, qs -c noctalia-shell ipc call controlCenter toggle
bind = $mainMod, H, exec, qs -c noctalia-shell ipc call plugin:keybind-cheatsheet toggle
bind = $mainMod, K, exec, qs -c noctalia-shell ipc call plugin:hyprland-keybinds toggle

# 3. Window Management
bind = $mainMod, Q, killactive
bind = $mainMod, W, togglefloating
bind = $mainMod, F, fullscreen

bind = $mainMod, TAB, workspace, m+1
bind = $mainMod SHIFT, TAB, workspace, m-1

bind = $mainMod, LEFT, movefocus, l
bind = $mainMod, RIGHT, movefocus, r
bind = $mainMod, UP, movefocus, u
bind = $mainMod, DOWN, movefocus, d
bind = ALT, TAB, cyclenext

bind = $mainMod SHIFT, RIGHT, resizeactive, 30 0
bind = $mainMod SHIFT, LEFT, resizeactive, -30 0
bind = $mainMod SHIFT, UP, resizeactive, 0 -30
bind = $mainMod SHIFT, DOWN, resizeactive, 0 30

$moveactivewindow = grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive

bind = $mainMod SHIFT CONTROL, LEFT, exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l
bind = $mainMod SHIFT CONTROL, RIGHT, exec, $moveactivewindow 30 0 || hyprctl dispatch movewindow r
bind = $mainMod SHIFT CONTROL, UP, exec, $moveactivewindow 0 -30 || hyprctl dispatch movewindow u
bind = $mainMod SHIFT CONTROL, DOWN, exec, $moveactivewindow 0 30 || hyprctl dispatch movewindow d

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, Z, movewindow
bindm = $mainMod, X, resizewindow

# 4. Screen Capture
# Removed PRINT dependency, using modern binds

bind = $mainMod SHIFT, S, exec, HYPRSHOT_DIR=~/Pictures/Screenshots hyprshot -m region
bind = $mainMod, A, exec, grim -g "$(slurp)" - | satty --filename - --output-filename ~/Pictures/Screenshots/Screenshot-$(date '+%Y%m%d-%H:%M:%S').png

# 5. Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod CONTROL, RIGHT, workspace, r+1
bind = $mainMod CONTROL, LEFT, workspace, r-1
bind = $mainMod CONTROL, DOWN, workspace, empty

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod CONTROL ALT, RIGHT, movetoworkspace, r+1
bind = $mainMod CONTROL ALT, LEFT, movetoworkspace, r-1

# 6. HARDWARE CONTROLS
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
